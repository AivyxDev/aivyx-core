# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
# Run with: cargo deny check

[advisories]
vulnerability = "deny"
unmaintained = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "Unicode-DFS-2016",
    "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
