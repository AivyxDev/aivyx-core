# ── CI Pipeline ───────────────────────────────────────────────────────
# Runs on every push to main and on pull requests.
# Uses the self-hosted runner on the Gitea VPS.
#
# Runs cargo build/test/clippy/fmt inside a Docker container because
# the bare VPS doesn't have the required build toolchain.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build, test, lint
        run: |
          docker run --rm \
            -v "$PWD":/build \
            -w /build \
            rust:1.94-bookworm \
            bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq \
                pkg-config libssl-dev libsqlite3-dev > /dev/null 2>&1

              echo "=== Build ==="
              cargo build --workspace

              echo "=== Test ==="
              cargo test --workspace

              echo "=== Clippy ==="
              rustup component add clippy 2>/dev/null
              cargo clippy --workspace -- -D warnings

              echo "=== Format ==="
              rustup component add rustfmt 2>/dev/null
              cargo fmt --all -- --check

              echo "=== Audit ==="
              cargo install cargo-audit --quiet
              cargo audit

              echo "✓ All checks passed"
            '

      - name: Cleanup Docker
        if: always()
        run: |
          docker system prune -f --filter "until=24h" 2>/dev/null || true
          docker image prune -af --filter "until=48h" 2>/dev/null || true
