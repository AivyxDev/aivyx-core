# ── GitHub Mirror Sync ───────────────────────────────────────────────
# Pushes the canonical Gitea repo to the GitHub mirror.
#
# Requires: GH_MIRROR_TOKEN secret with push access to AivyxDev/aivyx-core
#
# To set up:
#   1. Create a GitHub fine-grained PAT with "Contents: Read and write" on AivyxDev/aivyx-core
#   2. Add it as a Gitea secret: GH_MIRROR_TOKEN
#
name: Mirror to GitHub

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  mirror:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push to GitHub mirror
        run: |
          MIRROR_URL="https://x-access-token:${GH_MIRROR_TOKEN}@github.com/AivyxDev/aivyx-core.git"
          git remote add github "${MIRROR_URL}" 2>/dev/null || git remote set-url github "${MIRROR_URL}"
          git push github main --force
          git push github --tags --force
        env:
          GH_MIRROR_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
